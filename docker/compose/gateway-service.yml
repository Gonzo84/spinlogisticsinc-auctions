# =============================================================================
# Gateway Service (API Gateway + WebSocket Hub)
# =============================================================================

services:
  gateway-service:
    build:
      context: ../../services/gateway-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: ${PROJECT_NAME}-gateway-service
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_gateway
      QUARKUS_DATASOURCE_USERNAME: dev
      QUARKUS_DATASOURCE_PASSWORD: dev
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/auction-platform
      NATS_URL: nats://nats:4222
      QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      RATE_LIMIT_ENABLED: "false"
      WEBHOOK_ADYEN_HMAC_KEY: dev-hmac-key
      WEBHOOK_ONFIDO_TOKEN: dev-onfido-token
      # Upstream service routes (centralized in .env)
      AUCTION_ENGINE_URL: ${AUCTION_ENGINE_URL}
      CATALOG_SERVICE_URL: ${CATALOG_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      MEDIA_SERVICE_URL: ${MEDIA_SERVICE_URL}
      SEARCH_SERVICE_URL: ${SEARCH_SERVICE_URL}
      SELLER_SERVICE_URL: ${SELLER_SERVICE_URL}
      BROKER_SERVICE_URL: ${BROKER_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      COMPLIANCE_SERVICE_URL: ${COMPLIANCE_SERVICE_URL}
      CO2_SERVICE_URL: ${CO2_SERVICE_URL}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - platform-network

networks:
  platform-network:
    name: ${PROJECT_NAME}-network
