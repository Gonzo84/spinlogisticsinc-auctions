# =============================================================================
# User Service
# =============================================================================

services:
  user-service:
    build:
      context: ../../services/user-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: ${PROJECT_NAME}-user-service
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_users
      QUARKUS_DATASOURCE_USERNAME: dev
      QUARKUS_DATASOURCE_PASSWORD: dev
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/auction-platform
      NATS_URL: nats://nats:4222
      QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - platform-network

networks:
  platform-network:
    name: ${PROJECT_NAME}-network
