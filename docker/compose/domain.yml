      context: ../../services/media-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: media-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_media
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8086:8086"
    depends_on:
      <<: *depends-core
      minio:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/q/health/ready || exit 1"]

  # === Search Service ========================================================
  search-service:
    <<: *service-defaults
    build:
      context: ../../services/search-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: search-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_search
      QUARKUS_ELASTICSEARCH_HOSTS: elasticsearch:9200
    ports:
      - "8087:8087"
    depends_on:
      <<: *depends-core
      elasticsearch:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8087/q/health/ready || exit 1"]

  # === Seller Service ========================================================
  seller-service:
