<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete your payment</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background:#ffffff;">
        <tr>
            <td style="padding:24px;background-color:#1e40af;text-align:center;">
                <h1 style="color:#ffffff;margin:0;font-size:24px;">Payment Due</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:32px 24px;">
                <p style="color:#4a5568;font-size:16px;line-height:1.6;">
                    Please complete your payment for <strong>{lotTitle}</strong>. Timely payment ensures a smooth transaction for all parties.
                </p>
                <table style="width:100%;border-collapse:collapse;margin:24px 0;">
                    <tr>
                        <td style="padding:12px;border-bottom:1px solid #e2e8f0;color:#718096;">Total amount</td>
                        <td style="padding:12px;border-bottom:1px solid #e2e8f0;text-align:right;font-weight:bold;font-size:18px;color:#1e40af;">&euro;{totalAmount}</td>
                    </tr>
                    <tr>
                        <td style="padding:12px;color:#718096;">Payment due by</td>
                        <td style="padding:12px;text-align:right;font-weight:bold;color:#dc2626;">{dueDate}</td>
                    </tr>
                </table>
                <div style="text-align:center;margin:32px 0;">
                    <a href="{checkoutUrl}" style="display:inline-block;padding:14px 32px;background-color:#059669;color:#ffffff;text-decoration:none;border-radius:6px;font-size:16px;font-weight:bold;">
                        Complete Payment
                    </a>
                </div>
                <p style="color:#a0aec0;font-size:13px;text-align:center;">
                    Late payments may result in penalties or account restrictions.
                </p>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 24px;background-color:#f7fafc;text-align:center;color:#a0aec0;font-size:12px;">
                <p><a href="{preferencesUrl}" style="color:#1e40af;">Manage notifications</a></p>
            </td>
        </tr>
    </table>
</body>
</html>
