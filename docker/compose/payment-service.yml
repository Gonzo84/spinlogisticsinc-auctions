# =============================================================================
# Payment Service
# =============================================================================

services:
  payment-service:
    build:
      context: ../../services/payment-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: ${PROJECT_NAME}-payment-service
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_payments
      QUARKUS_DATASOURCE_USERNAME: dev
      QUARKUS_DATASOURCE_PASSWORD: dev
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/auction-platform
      NATS_URL: nats://nats:4222
      QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OIDC_AUTH_URL: http://keycloak:8080/realms/auction-platform
      AUCTION_ENGINE_URL: ${AUCTION_ENGINE_URL}
      CATALOG_SERVICE_URL: ${CATALOG_SERVICE_URL}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - platform-network

networks:
  platform-network:
    name: ${PROJECT_NAME}-network
