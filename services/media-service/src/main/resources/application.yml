# =============================================================================
# Media Service – Quarkus Configuration
# =============================================================================

quarkus:
  application:
    name: media-service

  # ---------------------------------------------------------------------------
  # Dev Services – disabled; infrastructure provided by docker-compose-infrastructure.yaml
  # ---------------------------------------------------------------------------
  devservices:
    enabled: false

  # ---------------------------------------------------------------------------
  # Datasource (default)
  # ---------------------------------------------------------------------------
  datasource:
    db-kind: postgresql
    jdbc:
      url: jdbc:postgresql://localhost:5432/auction_media
      max-size: 16
    username: dev
    password: dev

  # ---------------------------------------------------------------------------
  # Flyway (default)
  # ---------------------------------------------------------------------------
  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    default-schema: app

  # ---------------------------------------------------------------------------
  # OIDC
  # ---------------------------------------------------------------------------
  oidc:
    auth-server-url: http://localhost:8180/realms/auction-platform
    client-id: media-service
    credentials:
      secret: ${OIDC_SECRET:secret}
    roles:
      role-claim-path: realm_access/roles
    token:
      principal-claim: sub

  # ---------------------------------------------------------------------------
  # HTTP
  # ---------------------------------------------------------------------------
  http:
    port: 8086
    cors:
      origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
      methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      headers: accept,authorization,content-type,x-requested-with
      exposed-headers: location
      access-control-allow-credentials: true
    limits:
      max-body-size: 50M

  # ---------------------------------------------------------------------------
  # Logging – structured JSON
  # ---------------------------------------------------------------------------
  log:
    level: INFO
    console:
      json:
        enabled: ${LOG_JSON:false}
      format: "%d{HH:mm:ss} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{2.}] %s%e%n"
    category:
      "eu.auctionplatform":
        level: ${LOG_LEVEL:DEBUG}

  # ---------------------------------------------------------------------------
  # Metrics – Prometheus
  # ---------------------------------------------------------------------------
  micrometer:
    export:
      prometheus:
        enabled: true

  # ---------------------------------------------------------------------------
  # OpenTelemetry
  # ---------------------------------------------------------------------------
  otel:
    enabled: ${OTEL_ENABLED:true}
    exporter:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    resource:
      attributes:
        - service.name=${quarkus.application.name}

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  smallrye-health:
    root-path: /q/health

# -----------------------------------------------------------------------------
# NATS
# -----------------------------------------------------------------------------
nats:
  url: nats://localhost:4222

# -----------------------------------------------------------------------------
# Casbin RBAC
# -----------------------------------------------------------------------------
casbin:
  model-path: classpath:casbin_model.conf

# -----------------------------------------------------------------------------
# MinIO / S3 Object Storage
# -----------------------------------------------------------------------------
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    media: ${MINIO_BUCKET_MEDIA:auction-media}
    thumbnails: ${MINIO_BUCKET_THUMBNAILS:auction-thumbnails}
  region: ${MINIO_REGION:eu-west-1}
  secure: ${MINIO_SECURE:false}

# =============================================================================
# Profile: dev
# =============================================================================
"%dev":
  quarkus:
    log:
      level: DEBUG
      console:
        json: false
    datasource:
      jdbc:
        url: jdbc:postgresql://localhost:5432/auction_media
      username: dev
      password: dev
    oidc:
      auth-server-url: http://localhost:8180/realms/auction-platform
    otel:
      exporter:
        otlp:
          endpoint: http://localhost:4317
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin

# =============================================================================
# Profile: staging
# =============================================================================
"%staging":
  quarkus:
    log:
      level: INFO
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-staging:5432/auction_media}
        max-size: 32
      username: ${DB_USER:staging}
      password: ${DB_PASS:staging}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth-staging.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://staging.auction-platform.eu}
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-staging:4222}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio-staging:9000}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}

# =============================================================================
# Profile: prod
# =============================================================================
"%prod":
  quarkus:
    log:
      level: WARN
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-prod:5432/auction_media}
        max-size: 64
      username: ${DB_USER}
      password: ${DB_PASS}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://auction-platform.eu}
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-prod:4222}
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    secure: true
    region: ${MINIO_REGION:eu-west-1}
