name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/auction-platform
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  NODE_VERSION: "22"
  JAVA_VERSION: "21"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Lint
  # ──────────────────────────────────────────────────────────────
  lint-kotlin:
    name: Lint Kotlin (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew detekt
        working-directory: eu-auction-platform

  lint-frontend:
    name: Lint Frontend (ESLint + TypeCheck)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [buyer-web, seller-portal, admin-dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: eu-auction-platform/frontend/${{ matrix.app }}/package-lock.json
      - run: npm ci
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - name: ESLint (zero warnings)
        run: npm run lint -- --max-warnings 0
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - name: TypeCheck
        if: matrix.app == 'buyer-web'
        run: npm run typecheck
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - name: TypeCheck (vue-tsc)
        if: matrix.app != 'buyer-web'
        run: npx vue-tsc --noEmit
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Build
  # ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    needs: [lint-kotlin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build -x test
        working-directory: eu-auction-platform
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: eu-auction-platform/services/*/build/quarkus-app/
          retention-days: 1

  build-frontend:
    name: Build Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    strategy:
      matrix:
        app: [buyer-web, seller-portal, admin-dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: eu-auction-platform/frontend/${{ matrix.app }}/package-lock.json
      - run: npm ci
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - run: npm run build
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.app }}
          path: eu-auction-platform/frontend/${{ matrix.app }}/.output/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Test
  # ──────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
        working-directory: eu-auction-platform
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: eu-auction-platform/services/*/build/reports/tests/
          retention-days: 7

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction_dev
          POSTGRES_DB: auction_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      keycloak:
        image: quay.io/keycloak/keycloak:24.0
        env:
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          KC_DB: dev-mem
          KC_HTTP_PORT: 8080
        ports:
          - 8180:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health/ready || exit 1"
          --health-interval 10s
          --health-retries 20
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats \
            --health-cmd "wget -q -O- http://localhost:8222/healthz || exit 1" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 10 \
            --health-start-period 10s \
            -p 4222:4222 -p 8222:8222 \
            nats:2.10-alpine \
            --jetstream --http_port 8222
          # Wait for NATS to be healthy
          for i in $(seq 1 30); do
            wget -q -O- http://localhost:8222/healthz && break
            sleep 2
          done
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew integrationTest
        working-directory: eu-auction-platform
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/auction_test
          QUARKUS_DATASOURCE_USERNAME: auction
          QUARKUS_DATASOURCE_PASSWORD: auction_dev
          NATS_URL: nats://localhost:4222
          QUARKUS_OIDC_AUTH_SERVER_URL: http://localhost:8180/realms/master

  test-frontend:
    name: Frontend Unit Tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [build-frontend]
    strategy:
      matrix:
        app: [buyer-web, seller-portal, admin-dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: eu-auction-platform/frontend/${{ matrix.app }}/package-lock.json
      - run: npm ci
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - name: Run Vitest unit tests
        run: npm test --if-present -- --run --reporter=verbose
        working-directory: eu-auction-platform/frontend/${{ matrix.app }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results-${{ matrix.app }}
          path: eu-auction-platform/frontend/${{ matrix.app }}/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Security
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew dependencyCheckAnalyze
        working-directory: eu-auction-platform
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Stage 5: Build & Push Container Images
  # ──────────────────────────────────────────────────────────────
  build-images:
    name: Build Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - auction-engine
          - user-service
          - catalog-service
          - search-service
          - payment-service
          - notification-service
          - media-service
          - seller-service
          - broker-service
          - compliance-service
          - co2-service
          - analytics-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :services:${{ matrix.service }}:build -x test
        working-directory: eu-auction-platform
      - uses: docker/build-push-action@v6
        with:
          context: eu-auction-platform/services/${{ matrix.service }}
          file: eu-auction-platform/infrastructure/docker/Dockerfile.service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend-images:
    name: Build Frontend Image (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [buyer-web, seller-portal, admin-dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha
            type=ref,event=branch
      - uses: docker/build-push-action@v6
        with:
          context: eu-auction-platform/frontend/${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────────────────────
  # Stage 5b: Security scan container images (Trivy)
  # ──────────────────────────────────────────────────────────────
  scan-images:
    name: Scan Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service:
          - auction-engine
          - catalog-service
          - user-service
          - payment-service
          - notification-service
          - media-service
          - search-service
          - seller-service
          - broker-service
          - analytics-service
          - compliance-service
          - co2-service
          - gateway-service
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}'
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────────────────────────
  # Stage 5c: Frontend E2E tests
  # ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (buyer-web)
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: eu-auction-platform/frontend/buyer-web/package-lock.json
      - run: npm ci
        working-directory: eu-auction-platform/frontend/buyer-web
      - run: npx playwright install --with-deps chromium
        working-directory: eu-auction-platform/frontend/buyer-web
      - name: Build Nuxt app
        run: npm run build
        working-directory: eu-auction-platform/frontend/buyer-web
      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: eu-auction-platform/frontend/buyer-web
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: eu-auction-platform/frontend/buyer-web/playwright-report/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Stage 6: Deploy Staging
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, build-frontend-images]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - run: |
          echo "Deploying to staging environment..."
          # helm upgrade --install auction-platform ./helm/auction-platform \
          #   --namespace auction-staging \
          #   --values ./helm/auction-platform/values-staging.yaml \
          #   --set image.tag=${{ github.sha }}

  # ──────────────────────────────────────────────────────────────
  # Stage 7: Deploy Production
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, build-frontend-images]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - run: |
          echo "Deploying to production environment..."
          # helm upgrade --install auction-platform ./helm/auction-platform \
          #   --namespace auction-prod \
          #   --values ./helm/auction-platform/values-prod.yaml \
          #   --set image.tag=${{ github.sha }}
