# =============================================================================
# Service Dependencies on Infrastructure
# =============================================================================
# This file is merged with docker-compose-services.yaml to add depends_on
# when running the full stack. Kept separate so services can run standalone.
# =============================================================================

services:

  auction-engine:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  catalog-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  user-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  payment-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  media-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy

  search-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  seller-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  broker-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  compliance-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  co2-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  analytics-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  gateway-service:
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  platform-network:
    name: ${PROJECT_NAME}-network
