# =============================================================================
# Gateway Service – Quarkus Configuration
# =============================================================================

quarkus:
  application:
    name: gateway-service

  # ---------------------------------------------------------------------------
  # Dev Services – disabled; infrastructure provided by docker-compose-infrastructure.yaml
  # ---------------------------------------------------------------------------
  devservices:
    enabled: false

  # ---------------------------------------------------------------------------
  # Datasource (default)
  # ---------------------------------------------------------------------------
  datasource:
    db-kind: postgresql
    jdbc:
      url: jdbc:postgresql://localhost:5432/auction_gateway
      max-size: 16
    username: dev
    password: dev

  # ---------------------------------------------------------------------------
  # Flyway (default)
  # ---------------------------------------------------------------------------
  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    default-schema: app

  # ---------------------------------------------------------------------------
  # OIDC
  # ---------------------------------------------------------------------------
  oidc:
    auth-server-url: http://localhost:8180/realms/auction-platform
    client-id: gateway-service
    credentials:
      secret: ${OIDC_SECRET:secret}
    roles:
      role-claim-path: realm_access/roles
    token:
      principal-claim: sub

  # ---------------------------------------------------------------------------
  # HTTP
  # ---------------------------------------------------------------------------
  http:
    port: 8080
    cors:
      origins: http://localhost:3000,http://localhost:3001,http://localhost:3002
      methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      headers: accept,authorization,content-type,x-requested-with
      exposed-headers: location
      access-control-allow-credentials: true

  # ---------------------------------------------------------------------------
  # Logging – structured JSON
  # ---------------------------------------------------------------------------
  log:
    level: INFO
    console:
      json:
        enabled: ${LOG_JSON:false}
      format: "%d{HH:mm:ss} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{2.}] %s%e%n"
    category:
      "eu.auctionplatform":
        level: ${LOG_LEVEL:DEBUG}

  # ---------------------------------------------------------------------------
  # Redis (rate limiting, session cache)
  # ---------------------------------------------------------------------------
  redis:
    hosts: ${REDIS_URL:redis://localhost:6379}
    max-pool-size: ${REDIS_MAX_POOL:16}
    max-pool-waiting: ${REDIS_MAX_WAITING:32}
    timeout: ${REDIS_TIMEOUT:10s}

  # ---------------------------------------------------------------------------
  # WebSocket
  # ---------------------------------------------------------------------------
  websocket:
    dispatch-to-worker: true
    max-frame-size: 65536

  # ---------------------------------------------------------------------------
  # Metrics – Prometheus
  # ---------------------------------------------------------------------------
  micrometer:
    export:
      prometheus:
        enabled: true

  # ---------------------------------------------------------------------------
  # OpenTelemetry
  # ---------------------------------------------------------------------------
  otel:
    enabled: ${OTEL_ENABLED:true}
    exporter:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    resource:
      attributes:
        - service.name=${quarkus.application.name}

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  smallrye-health:
    root-path: /q/health

# -----------------------------------------------------------------------------
# NATS
# -----------------------------------------------------------------------------
nats:
  url: nats://localhost:4222

# -----------------------------------------------------------------------------
# Casbin RBAC
# -----------------------------------------------------------------------------
casbin:
  model-path: classpath:casbin_model.conf

# -----------------------------------------------------------------------------
# Rate Limiting
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# Webhook secrets
# -----------------------------------------------------------------------------
webhook:
  adyen:
    hmac-key: ${WEBHOOK_ADYEN_HMAC_KEY:}
  onfido:
    token: ${WEBHOOK_ONFIDO_TOKEN:}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  default:
    max-requests: ${RATE_LIMIT_MAX:100}
    window-seconds: ${RATE_LIMIT_WINDOW:60}
  redis-key-prefix: "rl:"

# -----------------------------------------------------------------------------
# Upstream service routes
# -----------------------------------------------------------------------------
gateway:
  routes:
    auction-engine:
      url: ${AUCTION_ENGINE_URL:http://localhost:8081}
    catalog-service:
      url: ${CATALOG_SERVICE_URL:http://localhost:8082}
    user-service:
      url: ${USER_SERVICE_URL:http://localhost:8083}
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8084}
    notification-service:
      url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
    media-service:
      url: ${MEDIA_SERVICE_URL:http://localhost:8086}
    search-service:
      url: ${SEARCH_SERVICE_URL:http://localhost:8087}
    seller-service:
      url: ${SELLER_SERVICE_URL:http://localhost:8088}
    broker-service:
      url: ${BROKER_SERVICE_URL:http://localhost:8089}
    analytics-service:
      url: ${ANALYTICS_SERVICE_URL:http://localhost:8090}
    compliance-service:
      url: ${COMPLIANCE_SERVICE_URL:http://localhost:8091}
    co2-service:
      url: ${CO2_SERVICE_URL:http://localhost:8092}

# =============================================================================
# Profile: dev
# =============================================================================
"%dev":
  quarkus:
    log:
      level: DEBUG
      console:
        json: false
    datasource:
      jdbc:
        url: jdbc:postgresql://localhost:5432/auction_gateway
      username: dev
      password: dev
    oidc:
      auth-server-url: http://localhost:8180/realms/auction-platform
    redis:
      hosts: redis://localhost:6379
    otel:
      exporter:
        otlp:
          endpoint: http://localhost:4317
  webhook:
    adyen:
      hmac-key: dev-hmac-key
    onfido:
      token: dev-onfido-token
  rate-limit:
    enabled: false

# =============================================================================
# Profile: staging
# =============================================================================
"%staging":
  quarkus:
    log:
      level: INFO
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-staging:5432/auction_gateway}
        max-size: 32
      username: ${DB_USER:staging}
      password: ${DB_PASS:staging}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth-staging.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://staging.auction-platform.eu}
    redis:
      hosts: ${REDIS_URL:redis://redis-staging:6379}
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-staging:4222}
  rate-limit:
    enabled: true
    default:
      max-requests: 200
      window-seconds: 60

# =============================================================================
# Profile: prod
# =============================================================================
"%prod":
  quarkus:
    log:
      level: WARN
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-prod:5432/auction_gateway}
        max-size: 64
      username: ${DB_USER}
      password: ${DB_PASS}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://auction-platform.eu}
    redis:
      hosts: ${REDIS_URL:redis://redis-prod:6379}
      max-pool-size: 32
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-prod:4222}
  rate-limit:
    enabled: true
    default:
      max-requests: 500
      window-seconds: 60
