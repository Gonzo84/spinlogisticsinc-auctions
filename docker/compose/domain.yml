# =============================================================================
# Domain Services (13 Kotlin/Quarkus microservices)
# =============================================================================
# Usage:
#   docker compose -f docker/compose/infrastructure.yml -f docker/compose/domain.yml up -d
# =============================================================================

# --- Shared defaults (YAML anchors) ------------------------------------------

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - auction-network

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 10s
  retries: 10
  start_period: 45s

x-common-env: &common-env
  QUARKUS_DATASOURCE_USERNAME: dev
  QUARKUS_DATASOURCE_PASSWORD: dev
  QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/auction-platform
  NATS_URL: nats://nats:4222
  QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

x-depends-core: &depends-core
  postgres:
    condition: service_healthy
  nats:
    condition: service_started

# --- Services ----------------------------------------------------------------

services:

  # === Gateway Service (API Gateway + WebSocket Hub) =========================
  gateway-service:
    <<: *service-defaults
    build:
      context: ../../services/gateway-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: gateway-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_gateway
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      RATE_LIMIT_ENABLED: "false"
      WEBHOOK_ADYEN_HMAC_KEY: dev-hmac-key
      WEBHOOK_ONFIDO_TOKEN: dev-onfido-token
      AUCTION_ENGINE_URL: http://auction-engine:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      USER_SERVICE_URL: http://user-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      MEDIA_SERVICE_URL: http://media-service:8086
      SEARCH_SERVICE_URL: http://search-service:8087
      SELLER_SERVICE_URL: http://seller-service:8088
      BROKER_SERVICE_URL: http://broker-service:8089
      ANALYTICS_SERVICE_URL: http://analytics-service:8090
      COMPLIANCE_SERVICE_URL: http://compliance-service:8091
      CO2_SERVICE_URL: http://co2-service:8092
    ports:
      - "8080:8080"
    depends_on:
      <<: *depends-core
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/q/health/ready || exit 1"]

  # === Auction Engine (event-sourced bidding core) ===========================
  auction-engine:
    <<: *service-defaults
    build:
      context: ../../services/auction-engine
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: auction-engine
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_engine
    ports:
      - "8081:8081"
    depends_on:
      <<: *depends-core
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/q/health/ready || exit 1"]

  # === Catalog Service =======================================================
  catalog-service:
    <<: *service-defaults
    build:
      context: ../../services/catalog-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: catalog-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_catalog
    ports:
      - "8082:8082"
    depends_on:
      <<: *depends-core
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/q/health/ready || exit 1"]

  # === User Service ==========================================================
  user-service:
    <<: *service-defaults
    build:
      context: ../../services/user-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: user-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_users
    ports:
      - "8083:8083"
    depends_on:
      <<: *depends-core
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/q/health/ready || exit 1"]

  # === Payment Service =======================================================
  payment-service:
    <<: *service-defaults
    build:
      context: ../../services/payment-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: payment-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_payments
    ports:
      - "8084:8084"
    depends_on:
      <<: *depends-core
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/q/health/ready || exit 1"]

  # === Notification Service ==================================================
  notification-service:
    <<: *service-defaults
    build:
      context: ../../services/notification-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: notification-service
    environment:
      <<: *common-env
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_notifications
      QUARKUS_MAILER_HOST: mailhog
      QUARKUS_MAILER_PORT: "1025"
      QUARKUS_MAILER_START_TLS: DISABLED
      QUARKUS_MAILER_MOCK: "false"
    ports:
      - "8085:8085"
    depends_on:
      <<: *depends-core
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/q/health/ready || exit 1"]

  # === Media Service =========================================================
  media-service:
    <<: *service-defaults
