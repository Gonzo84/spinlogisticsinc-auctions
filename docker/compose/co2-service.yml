# =============================================================================
# CO2 Service
# =============================================================================

services:
  co2-service:
    build:
      context: ../../services/co2-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: co2-service
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/auction_co2
      QUARKUS_DATASOURCE_USERNAME: dev
      QUARKUS_DATASOURCE_PASSWORD: dev
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/auction-platform
      NATS_URL: nats://nats:4222
      QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8092/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - auction-network

networks:
  auction-network:
    name: auction-network
