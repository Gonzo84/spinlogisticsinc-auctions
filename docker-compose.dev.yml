# =============================================================================
# Infrastructure Only (for local development with quarkusDev)
# =============================================================================
# This file starts only infrastructure services. Application services run
# via Gradle quarkusDev on the host.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down -v
#
# To run the full stack (infra + all 13 services) use:
#   docker compose -f docker-compose-full.yml up -d
# =============================================================================

include:
  - docker/compose/infrastructure.yml
