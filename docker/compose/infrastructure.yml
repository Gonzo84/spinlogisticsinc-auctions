# =============================================================================
# Infrastructure Services
# =============================================================================

services:
  # --- PostgreSQL -------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../../infrastructure/docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auction-network

  # --- NATS with JetStream ----------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: auction-nats
    restart: unless-stopped
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - auction-network

  # --- Keycloak ---------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: auction-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: dev
      KC_DB_PASSWORD: dev
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_URL: http://localhost:8180
      KC_HOSTNAME_ADMIN_URL: http://localhost:8180
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8180:8080"
    volumes:
      - ../../infrastructure/config/keycloak/auction-platform-realm.json:/opt/keycloak/data/import/auction-platform-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - auction-network

  # --- Redis ------------------------------------------------------------------
  redis:
    image: redis:7
    container_name: auction-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - auction-network

  # --- MinIO (S3-compatible) --------------------------------------------------
  minio:
    image: minio/minio
    container_name: auction-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - auction-network

  # --- MinIO bucket initialization --------------------------------------------
  minio-init:
    image: minio/mc
    container_name: auction-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/lot-images --ignore-existing;
      mc mb local/lot-images-raw --ignore-existing;
      mc mb local/lot-thumbnails --ignore-existing;
      mc mb local/invoices --ignore-existing;
      mc mb local/documents --ignore-existing;
      mc mb local/broker-uploads --ignore-existing;
      mc mb local/user-kyc --ignore-existing;
      mc anonymous set download local/lot-images;
      mc anonymous set download local/lot-thumbnails;
      echo 'MinIO buckets created.';
      "
    networks:
      - auction-network

  # --- Elasticsearch ----------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: auction-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - auction-network

  # --- Prometheus -------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    container_name: auction-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../../infrastructure/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - auction-network

  # --- Grafana ----------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: auction-grafana
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../../infrastructure/config/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - auction-network

  # --- OpenTelemetry Collector ------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: auction-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../../infrastructure/config/otel/collector-config.yml:/etc/otelcol-contrib/config.yaml
    networks:
      - auction-network

  # --- MailHog (dev email testing) --------------------------------------------
  mailhog:
    image: mailhog/mailhog
    container_name: auction-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - auction-network

volumes:
  postgres_data:
  nats_data:
  minio_data:
  es_data:
  grafana_data:

networks:
  auction-network:
    name: auction-network
    driver: bridge
