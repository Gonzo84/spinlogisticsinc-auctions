# =============================================================================
# Payment Service – Quarkus Configuration
# =============================================================================

quarkus:
  application:
    name: payment-service

  # ---------------------------------------------------------------------------
  # Dev Services – disabled; infrastructure provided by docker-compose-infrastructure.yaml
  # ---------------------------------------------------------------------------
  devservices:
    enabled: false

  # ---------------------------------------------------------------------------
  # Datasource (default)
  # ---------------------------------------------------------------------------
  datasource:
    db-kind: postgresql
    jdbc:
      url: jdbc:postgresql://localhost:5432/auction_payments
      max-size: 16
    username: dev
    password: dev

  # ---------------------------------------------------------------------------
  # Flyway (default)
  # ---------------------------------------------------------------------------
  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    default-schema: app

  # ---------------------------------------------------------------------------
  # OIDC
  # ---------------------------------------------------------------------------
  oidc:
    auth-server-url: http://localhost:8180/realms/auction-platform
    client-id: payment-service
    credentials:
      secret: ${OIDC_SECRET:secret}
    roles:
      role-claim-path: realm_access/roles
    token:
      principal-claim: sub

  # ---------------------------------------------------------------------------
  # HTTP
  # ---------------------------------------------------------------------------
  http:
    port: 8084
    cors:
      origins: http://localhost:3000,http://localhost:3001,http://localhost:3002
      methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      headers: accept,authorization,content-type,x-requested-with
      exposed-headers: location
      access-control-allow-credentials: true

  # ---------------------------------------------------------------------------
  # Logging – structured JSON
  # ---------------------------------------------------------------------------
  log:
    level: INFO
    console:
      json: true

  # ---------------------------------------------------------------------------
  # Metrics – Prometheus
  # ---------------------------------------------------------------------------
  micrometer:
    export:
      prometheus:
        enabled: true

  # ---------------------------------------------------------------------------
  # OpenTelemetry
  # ---------------------------------------------------------------------------
  opentelemetry:
    tracer:
      exporter:
        otlp:
          endpoint: http://localhost:4317

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  smallrye-health:
    root-path: /q/health

# -----------------------------------------------------------------------------
# NATS
# -----------------------------------------------------------------------------
nats:
  url: nats://localhost:4222

# -----------------------------------------------------------------------------
# Casbin RBAC
# -----------------------------------------------------------------------------
casbin:
  model-path: classpath:casbin_model.conf

# -----------------------------------------------------------------------------
# Adyen Payment Gateway
# -----------------------------------------------------------------------------
adyen:
  api-key: ${ADYEN_API_KEY:test-api-key}
  merchant-account: ${ADYEN_MERCHANT_ACCOUNT:TestMerchantAccount}
  environment: TEST
  live-endpoint-url-prefix: ${ADYEN_LIVE_PREFIX:}
  hmac-key: ${ADYEN_HMAC_KEY:test-hmac-key}
  client-key: ${ADYEN_CLIENT_KEY:test-client-key}
  return-url: ${ADYEN_RETURN_URL:http://localhost:3000/payment/return}
  webhook-url: ${ADYEN_WEBHOOK_URL:http://localhost:8084/api/v1/payments/webhook}
  currency: EUR

# =============================================================================
# Profile: dev
# =============================================================================
"%dev":
  quarkus:
    log:
      level: DEBUG
      console:
        json: false
    datasource:
      jdbc:
        url: jdbc:postgresql://localhost:5432/auction_payments
      username: dev
      password: dev
    oidc:
      auth-server-url: http://localhost:8180/realms/auction-platform
    opentelemetry:
      tracer:
        exporter:
          otlp:
            endpoint: http://localhost:4317
  adyen:
    environment: TEST
    api-key: ${ADYEN_API_KEY:test-api-key}
    merchant-account: ${ADYEN_MERCHANT_ACCOUNT:TestMerchantAccount}

# =============================================================================
# Profile: staging
# =============================================================================
"%staging":
  quarkus:
    log:
      level: INFO
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-staging:5432/auction_payments}
        max-size: 32
      username: ${DB_USER:staging}
      password: ${DB_PASS:staging}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth-staging.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://staging.auction-platform.eu}
    opentelemetry:
      tracer:
        exporter:
          otlp:
            endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-staging:4222}
  adyen:
    environment: TEST
    api-key: ${ADYEN_API_KEY}
    merchant-account: ${ADYEN_MERCHANT_ACCOUNT}
    return-url: ${ADYEN_RETURN_URL:https://staging.auction-platform.eu/payment/return}

# =============================================================================
# Profile: prod
# =============================================================================
"%prod":
  quarkus:
    log:
      level: WARN
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-prod:5432/auction_payments}
        max-size: 64
      username: ${DB_USER}
      password: ${DB_PASS}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://auction-platform.eu}
    opentelemetry:
      tracer:
        exporter:
          otlp:
            endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-prod:4222}
  adyen:
    environment: LIVE
    api-key: ${ADYEN_API_KEY}
    merchant-account: ${ADYEN_MERCHANT_ACCOUNT}
    live-endpoint-url-prefix: ${ADYEN_LIVE_PREFIX}
    hmac-key: ${ADYEN_HMAC_KEY}
    client-key: ${ADYEN_CLIENT_KEY}
    return-url: ${ADYEN_RETURN_URL:https://auction-platform.eu/payment/return}
    webhook-url: ${ADYEN_WEBHOOK_URL:https://api.auction-platform.eu/payments/webhook}
