<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickup reminder</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background:#ffffff;">
        <tr>
            <td style="padding:24px;background-color:#1e40af;text-align:center;">
                <h1 style="color:#ffffff;margin:0;font-size:24px;">Pickup Reminder</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:32px 24px;">
                <p style="color:#4a5568;font-size:16px;line-height:1.6;">
                    This is a reminder to pick up your purchased lot: <strong>{lotTitle}</strong>.
                </p>
                <table style="width:100%;border-collapse:collapse;margin:24px 0;">
                    <tr>
                        <td style="padding:12px;border-bottom:1px solid #e2e8f0;color:#718096;">Pickup address</td>
                        <td style="padding:12px;border-bottom:1px solid #e2e8f0;text-align:right;font-weight:bold;color:#1e3a5f;">{pickupAddress}</td>
                    </tr>
                    <tr>
                        <td style="padding:12px;color:#718096;">Pickup deadline</td>
                        <td style="padding:12px;text-align:right;font-weight:bold;color:#dc2626;">{pickupDeadline}</td>
                    </tr>
                </table>
                <div style="background:#fef3c7;padding:16px;border-radius:8px;margin:16px 0;">
                    <p style="color:#92400e;margin:0;font-size:14px;">
                        Please arrange pickup before the deadline. Items not collected by the deadline may incur additional storage fees.
                    </p>
                </div>
            </td>
        </tr>
        <tr>
            <td style="padding:16px 24px;background-color:#f7fafc;text-align:center;color:#a0aec0;font-size:12px;">
                <p><a href="{preferencesUrl}" style="color:#1e40af;">Manage notifications</a></p>
            </td>
        </tr>
    </table>
</body>
</html>
