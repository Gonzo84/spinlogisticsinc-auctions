# =============================================================================
# Auction Engine – Quarkus Configuration
# =============================================================================

quarkus:
  application:
    name: auction-engine

  # ---------------------------------------------------------------------------
  # Dev Services – disabled; infrastructure provided by docker-compose-infrastructure.yaml
  # ---------------------------------------------------------------------------
  devservices:
    enabled: false

  # ---------------------------------------------------------------------------
  # Datasource (default)
  # ---------------------------------------------------------------------------
  datasource:
    db-kind: postgresql
    jdbc:
      url: jdbc:postgresql://localhost:5432/auction_engine
      max-size: 16
    username: dev
    password: dev

  # ---------------------------------------------------------------------------
  # Flyway (default)
  # ---------------------------------------------------------------------------
  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    default-schema: app

  # ---------------------------------------------------------------------------
  # OIDC
  # ---------------------------------------------------------------------------
  oidc:
    auth-server-url: http://localhost:8180/realms/auction-platform
    client-id: auction-engine
    credentials:
      secret: ${OIDC_SECRET:secret}
    roles:
      role-claim-path: realm_access/roles
    token:
      principal-claim: sub

  # ---------------------------------------------------------------------------
  # HTTP
  # ---------------------------------------------------------------------------
  http:
    port: 8081
    cors:
      origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}
      methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      headers: accept,authorization,content-type,x-requested-with
      exposed-headers: location
      access-control-allow-credentials: true

  # ---------------------------------------------------------------------------
  # Logging – structured JSON
  # ---------------------------------------------------------------------------
  log:
    level: INFO
    console:
      json:
        enabled: ${LOG_JSON:false}
      format: "%d{HH:mm:ss} %-5p traceId=%X{traceId} spanId=%X{spanId} [%c{2.}] %s%e%n"
    category:
      "eu.auctionplatform":
        level: ${LOG_LEVEL:DEBUG}

  # ---------------------------------------------------------------------------
  # Metrics – Prometheus
  # ---------------------------------------------------------------------------
  micrometer:
    export:
      prometheus:
        enabled: true

  # ---------------------------------------------------------------------------
  # OpenTelemetry
  # ---------------------------------------------------------------------------
  otel:
    enabled: ${OTEL_ENABLED:true}
    exporter:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    resource:
      attributes:
        - service.name=${quarkus.application.name}

  # ---------------------------------------------------------------------------
  # Redis (required by quarkus-redis-client on classpath)
  # ---------------------------------------------------------------------------
  redis:
    hosts: ${QUARKUS_REDIS_HOSTS:redis://localhost:6379}

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  smallrye-health:
    root-path: /q/health

# -----------------------------------------------------------------------------
# Featured auctions
# -----------------------------------------------------------------------------
auction:
  featured:
    max-count: ${AUCTION_FEATURED_MAX_COUNT:12}
  auto-award:
    enabled: ${AUCTION_AUTO_AWARD_ENABLED:true}
    delay-seconds: ${AUCTION_AUTO_AWARD_DELAY_SECONDS:0}
    revoke-window-minutes: ${AUCTION_REVOKE_WINDOW_MINUTES:30}

# -----------------------------------------------------------------------------
# NATS
# -----------------------------------------------------------------------------
nats:
  url: nats://localhost:4222

# -----------------------------------------------------------------------------
# Casbin RBAC
# -----------------------------------------------------------------------------
casbin:
  model-path: classpath:casbin_model.conf

# =============================================================================
# Profile: dev
# =============================================================================
"%dev":
  quarkus:
    log:
      level: DEBUG
      console:
        json: false
    datasource:
      jdbc:
        url: jdbc:postgresql://localhost:5432/auction_engine
      username: dev
      password: dev
    oidc:
      auth-server-url: http://localhost:8180/realms/auction-platform
    otel:
      exporter:
        otlp:
          endpoint: http://localhost:4317

# =============================================================================
# Profile: staging
# =============================================================================
"%staging":
  quarkus:
    log:
      level: INFO
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-staging:5432/auction_engine}
        max-size: 32
      username: ${DB_USER:staging}
      password: ${DB_PASS:staging}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth-staging.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://staging.auction-platform.eu}
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-staging:4222}

# =============================================================================
# Profile: prod
# =============================================================================
"%prod":
  quarkus:
    log:
      level: WARN
      console:
        json: true
    datasource:
      jdbc:
        url: ${DB_URL:jdbc:postgresql://db-prod:5432/auction_engine}
        max-size: 64
      username: ${DB_USER}
      password: ${DB_PASS}
    oidc:
      auth-server-url: ${OIDC_AUTH_URL:https://auth.auction-platform.eu/realms/auction-platform}
    http:
      cors:
        origins: ${CORS_ORIGINS:https://auction-platform.eu}
    otel:
      exporter:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://otel-collector:4317}
  nats:
    url: ${NATS_URL:nats://nats-prod:4222}
