    ports:
      - "8089:8089"
    depends_on:
      <<: *depends-core
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8089/q/health/ready || exit 1"]

  # === Analytics Service =====================================================
  analytics-service:
    <<: *service-defaults
    build:
      context: ../../services/analytics-service
      dockerfile: ../../infrastructure/docker/Dockerfile.service
    container_name: analytics-service
    environment:
      <<: *common-env
